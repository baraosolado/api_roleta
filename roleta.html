<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteio — Salão Maravilhas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{background:#1a0a10;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem}
  #wrap{width:100%;max-width:480px}
  #header{background:linear-gradient(135deg,#b5005a 0%,#7a003c 60%,#3d001e 100%);padding:1.5rem;text-align:center;border-radius:16px 16px 0 0;position:relative}
  #header::after{content:'';display:block;height:3px;background:linear-gradient(90deg,#f7c6df,#e8006b,#f7c6df);margin-top:1rem;border-radius:2px}
  .star{position:absolute;color:#f9b8d4;opacity:.4;font-size:15px}
  .salon-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#fff;letter-spacing:1px}
  .salon-title span{color:#f9b8d4;font-weight:400}
  .salon-sub{font-size:11px;color:#f9b8d4;letter-spacing:3px;text-transform:uppercase;margin-top:4px}
  .salon-info{display:flex;justify-content:center;gap:16px;margin-top:.8rem;font-size:11px;color:#f9b8d4;opacity:.8}
  #body{position:relative;background:#1a0a10;border-radius:0 0 16px 16px;padding:1.5rem;border:1px solid rgba(181,0,90,0.3);border-top:none}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.2rem}
  .stat{background:rgba(181,0,90,0.15);border:1px solid rgba(181,0,90,0.35);border-radius:10px;padding:.75rem;text-align:center}
  .stat-n{font-size:22px;font-weight:700;color:#f9b8d4}
  .stat-l{font-size:10px;color:#f9b8d480;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  .section-title{text-align:center;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#f9b8d4;font-weight:500;margin-bottom:.9rem}
  #participants{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:1.2rem;min-height:32px}
  .p-chip{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #b5005a;color:#f9b8d4;background:rgba(181,0,90,0.15)}
  .p-chip.winner{background:#b5005a;color:#fff;border-color:#e8006b;font-weight:500}
  #wheel-stack{position:relative;margin-bottom:1.2rem}
  #wheel-area{display:flex;flex-direction:column;align-items:center;margin-bottom:0;position:relative;z-index:1}
  #pointer{width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:26px solid #f9b8d4;margin-bottom:-5px;z-index:10;position:relative;filter:drop-shadow(0 2px 6px rgba(249,184,212,0.6))}
  #wheel{border-radius:50%;display:block;box-shadow:0 0 0 5px #3d001e,0 0 0 9px #b5005a,0 0 32px rgba(181,0,90,0.5)}
  #spin-btn{margin-top:1.2rem;padding:13px 36px;font-size:15px;font-weight:600;border-radius:30px;border:none;cursor:pointer;background:linear-gradient(135deg,#e8006b,#b5005a);color:#fff;box-shadow:0 4px 18px rgba(232,0,107,0.45);font-family:'DM Sans',sans-serif;letter-spacing:.3px}
  #spin-btn:hover{opacity:.88}
  #spin-btn:disabled{opacity:.35;cursor:not-allowed}
  #confetti-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}
  #result{display:none;margin-top:1.1rem;background:linear-gradient(135deg,rgba(26,10,16,0.92),rgba(181,0,90,0.55),rgba(232,0,107,0.35));border:2px solid #e8006b;border-radius:18px;padding:1.5rem 1rem 1.35rem;text-align:center;position:relative;z-index:10;isolation:isolate;transform:translateZ(0);box-shadow:0 0 40px rgba(232,0,107,0.35),inset 0 1px 0 rgba(255,255,255,0.12)}
  #result.show{display:block;animation:resultCardIn .5s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes resultCardIn{from{transform:scale(.9) translateY(12px)}to{transform:scale(1) translateY(0)}}
  .result-label{font-size:11px;letter-spacing:3px;color:#f9b8d4;text-transform:uppercase;margin-bottom:.55rem;font-weight:600}
  .result-name{
    font-size:clamp(2.25rem,12vmin,4rem);
    font-weight:800;
    color:#fff;
    font-family:'Playfair Display','Georgia',serif;
    line-height:1.08;
    margin:.35rem 0 .65rem;
    padding:0 .35rem;
    max-width:100%;
    word-break:break-word;
    opacity:1;
    visibility:visible;
    text-shadow:0 0 28px rgba(232,0,107,0.85),0 0 60px rgba(181,0,90,0.55),0 4px 20px rgba(0,0,0,0.65);
    animation:winnerNamePop .65s cubic-bezier(.34,1.4,.64,1) both,winnerPulse 2s ease-in-out .65s infinite alternate;
  }
  @keyframes winnerNamePop{0%{transform:scale(.55) translateY(14px)}65%{transform:scale(1.08) translateY(0)}100%{transform:scale(1) translateY(0)}}
  @keyframes winnerPulse{from{filter:brightness(1) drop-shadow(0 0 8px rgba(249,184,212,0.4))}to{filter:brightness(1.12) drop-shadow(0 0 18px rgba(232,0,107,0.55))}}
  .result-date{font-size:11px;color:#f9b8d470}
  .confetti-row{font-size:22px;letter-spacing:6px;margin-bottom:.65rem;animation:emojiBounce .9s ease-out .15s both}
  @keyframes emojiBounce{0%{transform:translateY(-14px) scale(.6);opacity:0}60%{transform:translateY(4px) scale(1.1)}100%{transform:translateY(0) scale(1);opacity:1}}
  .reset-btn{display:block;margin:.7rem auto 0;font-size:12px;color:#f9b8d450;background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif}
  .reset-btn:hover{color:#f9b8d4}
  #footer{margin-top:1rem;text-align:center;font-size:11px;color:#f9b8d430;letter-spacing:1px}
</style>
</head>
<body>
<div id="wrap">
  <div id="header">
    <div class="star" style="top:12px;left:16px">✦</div>
    <div class="star" style="top:12px;right:16px">✦</div>
    <div class="star" style="bottom:22px;left:38px;font-size:10px">✦</div>
    <div class="star" style="bottom:22px;right:38px;font-size:10px">✦</div>
    <div class="salon-title">✦ Salão <span>Maravilhas</span></div>
    <div class="salon-sub">Beleza & Bem-estar</div>
    <div class="salon-info">
      <span>📍 Jd Interlagos</span>
      <span>📞 43998502056</span>
      <span>✉️ maravilhas@gmail.com</span>
    </div>
  </div>
  <div id="body">
    <br>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Total</div></div>
      <div class="stat"><div class="stat-n" id="s-eleg">0</div><div class="stat-l">Elegíveis</div></div>
      <div class="stat"><div class="stat-n" id="s-sort">0</div><div class="stat-l">Sorteadas</div></div>
    </div>
    <div class="section-title">Participantes</div>
    <div id="participants"></div>
    <div class="section-title">Roleta do sorteio</div>
    <div id="wheel-stack">
      <div id="wheel-area">
        <div id="pointer"></div>
        <canvas id="wheel" width="260" height="260"></canvas>
        <button id="spin-btn" onclick="spin()">✨ Girar a Roleta</button>
        <button class="reset-btn" onclick="resetAll()">Resetar sorteios (novo ciclo)</button>
      </div>
      <canvas id="confetti-canvas" aria-hidden="true"></canvas>
    </div>
    <div id="result">
      <div class="confetti-row">🎉 🌸 🎊</div>
      <div class="result-label">Sorteada do mês</div>
      <div class="result-name" id="result-name"></div>
      <div class="result-date" id="result-date"></div>
    </div>
  </div>
  <div id="footer">✦ Salão Maravilhas — Consórcio Dia 10 ✦</div>
</div>
<script>
const COLORS=['#b5005a','#7a003c','#d4006b','#e8006b','#8c0047','#c2005f','#99004f','#bf0062','#6e0038','#a80055'];
const CONFETTI_PALETTE=['#f9b8d4','#e8006b','#b5005a','#ffffff','#f7c6df','#ffd54a','#ff8cc6','#c8ff9e'];
const EXTRA_SPINS = 8 * Math.PI * 2;
const DURATION = 5000;
let clients = [];
let spinning = false;
let wheelAngle = 0;
/** Se não for null, drawWheel usa esta lista (mesma ordem/N do giro) para não “pular” o ponteiro após marcar a ganhadora. */
let wheelDrawEligible = null;

const confettiCanvas=document.getElementById('confetti-canvas');
const confettiCtx=confettiCanvas&&confettiCanvas.getContext('2d');
let confettiParticles=[];
let confettiRaf=null;
let confettiActive=false;

function syncConfettiSize(){
  if(!confettiCanvas) return;
  const stack=document.getElementById('wheel-stack');
  const b=document.getElementById('body');
  const el=stack||b;
  const w=el?el.clientWidth:Math.min(window.innerWidth||480,480);
  const h=el?el.clientHeight:Math.min(window.innerHeight||780,780);
  confettiCanvas.width=Math.max(1,w);
  confettiCanvas.height=Math.max(1,h);
}
window.addEventListener('resize',syncConfettiSize);
syncConfettiSize();

function spawnConfettiBurst(cx,cy,count){
  for(let i=0;i<count;i++){
    const a=(Math.PI*2*Math.random());
    const sp=6+Math.random()*10;
    confettiParticles.push({
      x:cx,y:cy,
      vx:Math.cos(a)*sp*(0.5+Math.random()),
      vy:Math.sin(a)*sp-4-Math.random()*8,
      g:0.22+Math.random()*0.18,
      drag:0.988+Math.random()*0.008,
      rot:Math.random()*Math.PI*2,
      vr:(Math.random()-0.5)*0.35,
      w:5+Math.random()*9,
      h:3+Math.random()*7,
      color:CONFETTI_PALETTE[(Math.random()*CONFETTI_PALETTE.length)|0],
      shape:Math.random()<0.55?'rect':'diamond',
      life:1,
    });
  }
}

function drawConfettiFrame(){
  if(!confettiCtx||!confettiCanvas) return;
  const W=confettiCanvas.width,H=confettiCanvas.height;
  confettiCtx.clearRect(0,0,W,H);
  for(const p of confettiParticles){
    if(p.life<=0) continue;
    p.vy+=p.g;
    p.vx*=p.drag;
    p.vy*=p.drag;
    p.x+=p.vx;
    p.y+=p.vy;
    p.rot+=p.vr;
    p.life-=0.011;
    confettiCtx.save();
    confettiCtx.translate(p.x,p.y);
    confettiCtx.rotate(p.rot);
    confettiCtx.globalAlpha=Math.max(0,Math.min(1,p.life));
    confettiCtx.fillStyle=p.color;
    if(p.shape==='rect'){
      confettiCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    }else{
      confettiCtx.beginPath();
      confettiCtx.moveTo(-p.w/2,0);
      confettiCtx.lineTo(0,-p.h);
      confettiCtx.lineTo(p.w/2,0);
      confettiCtx.lineTo(0,p.h);
      confettiCtx.closePath();
      confettiCtx.fill();
    }
    confettiCtx.restore();
  }
  confettiParticles=confettiParticles.filter(
    p=>p.life>0.02&&p.y<H+60&&p.x>-40&&p.x<W+40,
  );
  if(confettiParticles.length){
    confettiRaf=requestAnimationFrame(drawConfettiFrame);
  }else{
    confettiActive=false;
    confettiRaf=null;
    confettiCtx.clearRect(0,0,W,H);
  }
}

function startConfettiCelebration(){
  if(!confettiCanvas||!confettiCtx) return;
  syncConfettiSize();
  const W=confettiCanvas.width,H=confettiCanvas.height;
  const cx=W*0.5,cy=H*0.38;
  spawnConfettiBurst(cx,cy,85);
  spawnConfettiBurst(W*0.15,H*0.28,28);
  spawnConfettiBurst(W*0.85,H*0.28,28);
  setTimeout(()=>{
    spawnConfettiBurst(cx,Math.min(H*0.55,cy+40),50);
    if(confettiParticles.length&&!confettiRaf){
      confettiActive=true;
      drawConfettiFrame();
    }
  },280);
  setTimeout(()=>{
    spawnConfettiBurst(cx,cy,40);
    if(confettiParticles.length&&!confettiRaf){
      confettiActive=true;
      drawConfettiFrame();
    }
  },520);
  confettiActive=true;
  if(confettiRaf)cancelAnimationFrame(confettiRaf);
  confettiRaf=null;
  drawConfettiFrame();
}

function eligible(){ return clients.filter(c => !c.sorteada) }
function normalizeAngle(a){ return ((a % (Math.PI*2)) + Math.PI*2) % (Math.PI*2) }

function render(){
  const el = eligible();
  document.getElementById('s-total').textContent = clients.length;
  document.getElementById('s-eleg').textContent = el.length;
  document.getElementById('s-sort').textContent = clients.filter(c=>c.sorteada).length;
  const btn = document.getElementById('spin-btn');
  if(btn) btn.disabled = el.length < 1;
  document.getElementById('participants').innerHTML = clients.map((c,i) =>
    `<span class="p-chip ${c.sorteada?'winner':''}">${c.sorteada?'✓ ':''}${c.name}</span>`
  ).join('');
  drawWheel();
}

function drawWheel(){
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx=130, cy=130, r=122;
  const el = wheelDrawEligible !== null ? wheelDrawEligible : eligible();
  ctx.clearRect(0,0,260,260);
  if(!el.length){
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#3d001e'; ctx.fill();
    ctx.fillStyle='#f9b8d480'; ctx.font='13px sans-serif';
    ctx.textAlign='center'; ctx.fillText('Todas sorteadas!',cx,cy);
    return;
  }
  const slice = (Math.PI*2) / el.length;
  el.forEach((c,i) => {
    const s = wheelAngle + i*slice, e = s + slice;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,s,e); ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length]; ctx.fill();
    ctx.strokeStyle = '#1a0a10'; ctx.lineWidth = 2; ctx.stroke();
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(s + slice/2);
    ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.font='bold 11px DM Sans,sans-serif';
    ctx.fillText(c.name.split(' ')[0], r-8, 4);
    ctx.restore();
  });
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='#e8006b'; ctx.lineWidth=3; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,20,0,Math.PI*2);
  ctx.fillStyle='#1a0a10'; ctx.fill();
  ctx.strokeStyle='#f9b8d4'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#f9b8d4'; ctx.font='bold 13px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('✦',cx,cy);
}

// ─── Esta função é chamada pelo Playwright após carregar a página ───
window.iniciarSorteio = function(nomes, ganhadora) {
  wheelDrawEligible = null;
  clients = nomes.map(n => ({ name: n, sorteada: false }));
  render();

  const el = eligible();
  const winnerIdx = el.findIndex(c => c.name === ganhadora);
  if(winnerIdx === -1) return;

  const wheelEligibleSnapshot = el.map(c => ({ name: c.name, sorteada: false }));

  spinning = true;
  const slice = (Math.PI*2) / el.length;
  wheelAngle = normalizeAngle(wheelAngle);
  const pointerAngle = (3 * Math.PI) / 2;
  let targetAngle = normalizeAngle(pointerAngle - winnerIdx * slice - slice / 2);
  let delta = targetAngle - wheelAngle;
  if(delta <= 0) delta += Math.PI * 2;
  delta += EXTRA_SPINS;

  const startAngle = wheelAngle;
  const exactFinalAngle = normalizeAngle(startAngle + delta);
  const start = performance.now();
  function ease(t){ return 1 - Math.pow(1-t, 4) }

  function frame(now){
    const t = Math.min((now - start) / DURATION, 1);
    wheelAngle = startAngle + delta * ease(t);
    drawWheel();
    if(t < 1){ requestAnimationFrame(frame) }
    else {
      wheelAngle = exactFinalAngle;
      spinning = false;
      const winner = el[winnerIdx];
      const idx = clients.findIndex(c => c.name === winner.name);
      clients[idx].sorteada = true;
      wheelDrawEligible = wheelEligibleSnapshot;
      render();
      document.getElementById('result-name').textContent = winner.name;
      const d = new Date();
      document.getElementById('result-date').textContent =
        'Sorteio realizado em ' + d.toLocaleDateString('pt-BR') + ' — Salão Maravilhas';
      const resEl = document.getElementById('result');
      resEl.classList.add('show');
      requestAnimationFrame(() => {
        resEl.scrollIntoView({ block: 'center', behavior: 'instant' });
      });
      startConfettiCelebration();
      window._sorteioFinalizado = true;
    }
  }
  requestAnimationFrame(frame);
}

function spin(){}
function resetAll(){}
</script>
</body>
</html>
